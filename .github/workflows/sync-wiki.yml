# Sync GitHub Wiki (manual trigger)

name: Sync GitHub Wiki

on:
  workflow_dispatch:
    inputs:
      skip_gallery:
        description: Skip sprite PNG export (docs-only; publish preserves live Amiga gallery)
        type: boolean
        default: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Pillow
        run: pip install pillow

      - name: Export GitHub Wiki tree
        run: |
          args=""
          if [ "${{ inputs.skip_gallery }}" = "true" ]; then args="--skip-gallery"; fi
          python wiki/scripts/export-github-wiki.py $args

      - name: Publish to wiki repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/Vairn/MM2.wiki.git"
          python wiki/scripts/publish-github-wiki.py --remote "$REMOTE" --no-export
