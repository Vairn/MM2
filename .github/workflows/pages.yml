# GitHub Pages — interactive map walker (HTML5/JS, not supported on GitHub Wiki).
name: Deploy Map Walker

on:
  push:
    branches: [main, master, feature/in-town-play-session]
    paths:
      - "wiki/maze-walker/**"
      - "tools/export_map_walker.py"
      - "tools/mm2_gfx_export.py"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Stage site at /maze-walker/
        run: |
          mkdir -p _site/maze-walker
          cp -r wiki/maze-walker/. _site/maze-walker/

      # Requires one-time enable: repo Settings → Pages → Source: GitHub Actions.
      # Until then GET /repos/{owner}/{repo}/pages returns 404 (see Pages REST API).
      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - uses: actions/deploy-pages@v4
        id: deployment
